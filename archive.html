---
layout: baseLayout.html
title: Archive
---

<main>
  <h1 class="text-center my-body">Archive</h1>

  <section class="body-section p-0">
    <ul class="grid">
      {% for note in collections.note reversed %}
      <li class="card">
        <a href="{{ note.url }}">
          <span class="card-icon glowicon" data-icon="{{ note.data.icon }}">
            {{ note.data.icon }}
          </span>
          <span class="card-title" data-clamp>
            {{ note.page.date | date: "%B %Y" }}
          </span>
          <span class="card-description" data-clamp style="--clamp: 2">
            {{ note.data.title }}
          </span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </section>
</main>
